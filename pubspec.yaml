name: nutrient_earth
description: Nutrient Earth App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  http: ^1.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.12.4

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  file_picker: ^8.0.0+1
  lottie: 3.1.0
  smooth_page_indicator: 1.1.0
  shared_preferences: 2.2.3
  intl: ^0.20.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  speech_to_text: ^7.3.0
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_markdown: ^0.7.7+1
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/